<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 精美贪吃蛇游戏</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 动态背景粒子 */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            z-index: 10;
            position: relative;
            max-width: 600px;
            width: 90%;
        }

        h1 {
            color: #fff;
            font-size: 2.5em;
            font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            }
            to {
                text-shadow: 0 0 30px rgba(255, 255, 255, 0.8), 0 0 40px rgba(255, 255, 255, 0.6);
            }
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 20px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 15px;
            flex: 1;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .info-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .info-value {
            color: #fff;
            font-size: 1.5em;
            font-weight: 700;
        }

        .difficulty-selector {
            margin-bottom: 20px;
        }

        .difficulty-selector select {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 10px 20px;
            font-size: 16px;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .difficulty-selector select:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .difficulty-selector option {
            background: #2c3e50;
            color: white;
        }

        .game-canvas-container {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        #gameCanvas {
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.3);
            background: linear-gradient(45deg, #1a1a2e, #16213e);
            transition: all 0.3s ease;
        }

        #gameCanvas:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 16px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(238, 90, 36, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(238, 90, 36, 0.6);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn.secondary {
            background: linear-gradient(45deg, #74b9ff, #0984e3);
            box-shadow: 0 5px 15px rgba(9, 132, 227, 0.4);
        }

        .btn.secondary:hover {
            box-shadow: 0 8px 25px rgba(9, 132, 227, 0.6);
        }

        .instructions {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
            line-height: 1.6;
        }

        .instructions p {
            margin-bottom: 8px;
        }

        /* 游戏结束弹窗 */
        .game-over-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.3);
            animation: modalSlideIn 0.5s ease-out;
        }

        @keyframes modalSlideIn {
            from {
                transform: scale(0.7) translateY(-50px);
                opacity: 0;
            }
            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .modal-content h2 {
            color: #fff;
            font-size: 2em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .final-score {
            color: #fff;
            font-size: 1.5em;
            margin-bottom: 30px;
        }

        /* 移动端控制按钮 */
        .mobile-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
            max-width: 200px;
            margin-left: auto;
            margin-right: auto;
        }

        .mobile-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            color: white;
            font-size: 20px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .mobile-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .mobile-btn:active {
            transform: scale(0.95);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .mobile-controls {
                display: grid;
            }

            .game-container {
                padding: 20px;
                margin: 10px;
            }

            h1 {
                font-size: 2em;
            }

            #gameCanvas {
                width: 100%;
                max-width: 350px;
                height: auto;
            }

            .controls {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 200px;
            }
        }

        /* 特效动画 */
        .score-popup {
            position: absolute;
            color: #00ff00;
            font-weight: bold;
            font-size: 20px;
            pointer-events: none;
            animation: scoreFloat 1s ease-out forwards;
        }

        @keyframes scoreFloat {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px);
            }
        }
    </style>
</head>
<body>
    <!-- 动态背景粒子 -->
    <div class="particles" id="particles"></div>

    <div class="game-container">
        <h1>🐍 精美贪吃蛇</h1>

        <div class="game-info">
            <div class="info-card">
                <div class="info-label">当前分数</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-card">
                <div class="info-label">最高分数</div>
                <div class="info-value" id="highScore">0</div>
            </div>
            <div class="info-card">
                <div class="info-label">游戏长度</div>
                <div class="info-value" id="length">1</div>
            </div>
        </div>

        <div class="difficulty-selector">
            <label for="difficulty" style="color: white; margin-right: 10px;">游戏难度:</label>
            <select id="difficulty">
                <option value="easy">🐌 简单模式</option>
                <option value="medium" selected>🚀 中等模式</option>
                <option value="hard">⚡ 困难模式</option>
                <option value="extreme">🔥 极限模式</option>
            </select>
        </div>

        <div class="game-canvas-container">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>

        <div class="controls">
            <button class="btn" onclick="startGame()">🎮 开始游戏</button>
            <button class="btn secondary" onclick="pauseGame()">⏸️ 暂停/继续</button>
            <button class="btn secondary" onclick="resetGame()">🔄 重新开始</button>
        </div>

        <!-- 移动端控制 -->
        <div class="mobile-controls">
            <div></div>
            <div class="mobile-btn" onclick="changeDirection(0, -1)">⬆️</div>
            <div></div>
            <div class="mobile-btn" onclick="changeDirection(-1, 0)">⬅️</div>
            <div class="mobile-btn" onclick="pauseGame()">⏸️</div>
            <div class="mobile-btn" onclick="changeDirection(1, 0)">➡️</div>
            <div></div>
            <div class="mobile-btn" onclick="changeDirection(0, 1)">⬇️</div>
            <div></div>
        </div>

        <div class="instructions">
            <p>🎯 使用方向键或 WASD 控制蛇的移动</p>
            <p>🍎 吃到食物可以增长身体和得分</p>
            <p>⚠️ 避免撞到墙壁或自己的身体</p>
            <p>📱 移动设备可使用屏幕按钮控制</p>
        </div>
    </div>

    <!-- 游戏结束弹窗 -->
    <div class="game-over-modal" id="gameOverModal">
        <div class="modal-content">
            <h2>🎮 游戏结束!</h2>
            <div class="final-score">
                最终分数: <span id="finalScore">0</span>
            </div>
            <button class="btn" onclick="restartGame()">🔄 再来一局</button>
        </div>
    </div>

    <script>
        // 游戏元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const lengthElement = document.getElementById('length');
        const gameOverModal = document.getElementById('gameOverModal');
        const finalScoreElement = document.getElementById('finalScore');
        const difficultySelect = document.getElementById('difficulty');

        // 游戏配置
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // 游戏状态
        let snake = [{x: Math.floor(tileCount/2), y: Math.floor(tileCount/2)}];
        let food = {};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('premiumSnakeHighScore') || 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameLoop;

        // 难度设置
        const difficulties = {
            easy: 250,
            medium: 180,
            hard: 120,
            extreme: 80
        };

        // 颜色主题
        const colors = {
            snake: '#00ff88',
            snakeHead: '#00cc66',
            food: '#ff4757',
            background: '#1a1a2e',
            grid: 'rgba(255, 255, 255, 0.1)'
        };

        // 初始化
        highScoreElement.textContent = highScore;
        generateFood();
        drawGame();
        createParticles();

        // 创建背景粒子
        function createParticles() {
            const particlesContainer = document.getElementById('particles');

            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // 生成食物
        function generateFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        // 绘制游戏
        function drawGame() {
            // 清空画布
            ctx.fillStyle = colors.background;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格
            drawGrid();

            // 绘制蛇
            drawSnake();

            // 绘制食物
            drawFood();
        }

        // 绘制网格
        function drawGrid() {
            ctx.strokeStyle = colors.grid;
            ctx.lineWidth = 1;

            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
        }

        // 绘制蛇
        function drawSnake() {
            snake.forEach((segment, index) => {
                const x = segment.x * gridSize;
                const y = segment.y * gridSize;

                // 蛇头特殊样式
                if (index === 0) {
                    // 蛇头渐变
                    const gradient = ctx.createRadialGradient(
                        x + gridSize/2, y + gridSize/2, 0,
                        x + gridSize/2, y + gridSize/2, gridSize/2
                    );
                    gradient.addColorStop(0, colors.snakeHead);
                    gradient.addColorStop(1, colors.snake);
                    ctx.fillStyle = gradient;

                    // 圆角矩形
                    drawRoundedRect(x + 1, y + 1, gridSize - 2, gridSize - 2, 8);

                    // 眼睛
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(x + 5, y + 5, 3, 3);
                    ctx.fillRect(x + 12, y + 5, 3, 3);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(x + 6, y + 6, 1, 1);
                    ctx.fillRect(x + 13, y + 6, 1, 1);
                } else {
                    // 蛇身渐变
                    const alpha = 1 - (index * 0.1);
                    ctx.fillStyle = colors.snake + Math.floor(alpha * 255).toString(16).padStart(2, '0');
                    drawRoundedRect(x + 2, y + 2, gridSize - 4, gridSize - 4, 6);
                }
            });
        }

        // 绘制食物
        function drawFood() {
            const x = food.x * gridSize;
            const y = food.y * gridSize;

            // 食物渐变
            const gradient = ctx.createRadialGradient(
                x + gridSize/2, y + gridSize/2, 0,
                x + gridSize/2, y + gridSize/2, gridSize/2
            );
            gradient.addColorStop(0, '#ff6b6b');
            gradient.addColorStop(0.7, colors.food);
            gradient.addColorStop(1, '#c44569');

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(x + gridSize/2, y + gridSize/2, gridSize/2 - 2, 0, 2 * Math.PI);
            ctx.fill();

            // 食物高光
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.beginPath();
            ctx.arc(x + gridSize/2 - 3, y + gridSize/2 - 3, 3, 0, 2 * Math.PI);
            ctx.fill();
        }

        // 绘制圆角矩形
        function drawRoundedRect(x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            ctx.fill();
        }

        // 移动蛇
        function moveSnake() {
            if (!gameRunning || gamePaused) return;

            if (dx === 0 && dy === 0) return;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // 检查边界碰撞
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // 检查自身碰撞
            if (snake.some(segment => head.x === segment.x && head.y === segment.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                lengthElement.textContent = snake.length;

                // 分数弹出动画
                showScorePopup('+10');

                generateFood();

                // 检查最高分
                if (score > highScore) {
                    highScore = score;
                    highScoreElement.textContent = highScore;
                    localStorage.setItem('premiumSnakeHighScore', highScore);
                }
            } else {
                snake.pop();
            }

            drawGame();
        }

        // 显示分数弹出动画
        function showScorePopup(text) {
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = text;
            popup.style.left = (food.x * gridSize + canvas.offsetLeft) + 'px';
            popup.style.top = (food.y * gridSize + canvas.offsetTop) + 'px';

            document.body.appendChild(popup);

            setTimeout(() => {
                document.body.removeChild(popup);
            }, 1000);
        }

        // 开始游戏
        function startGame() {
            if (gameRunning && !gamePaused) return;

            if (!gameRunning) {
                resetGame();
            }

            gameRunning = true;
            gamePaused = false;
            gameOverModal.style.display = 'none';

            const difficulty = difficultySelect.value;
            const speed = difficulties[difficulty];

            clearInterval(gameLoop);
            gameLoop = setInterval(moveSnake, speed);
        }

        // 暂停游戏
        function pauseGame() {
            if (!gameRunning) return;

            gamePaused = !gamePaused;

            if (gamePaused) {
                clearInterval(gameLoop);
            } else {
                const difficulty = difficultySelect.value;
                const speed = difficulties[difficulty];
                gameLoop = setInterval(moveSnake, speed);
            }
        }

        // 重置游戏
        function resetGame() {
            clearInterval(gameLoop);
            snake = [{x: Math.floor(tileCount/2), y: Math.floor(tileCount/2)}];
            dx = 0;
            dy = 0;
            score = 0;
            scoreElement.textContent = score;
            lengthElement.textContent = snake.length;
            gameRunning = false;
            gamePaused = false;
            gameOverModal.style.display = 'none';
            generateFood();
            drawGame();
        }

        // 游戏结束
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            finalScoreElement.textContent = score;
            gameOverModal.style.display = 'flex';
        }

        // 重新开始游戏
        function restartGame() {
            gameOverModal.style.display = 'none';
            resetGame();
            startGame();
        }

        // 改变方向（移动端使用）
        function changeDirection(newDx, newDy) {
            if (!gameRunning || gamePaused) return;

            // 防止反向移动
            if ((dx === 1 && newDx === -1) || (dx === -1 && newDx === 1) ||
                (dy === 1 && newDy === -1) || (dy === -1 && newDy === 1)) {
                return;
            }

            dx = newDx;
            dy = newDy;
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameRunning || gamePaused) return;

            const key = e.key.toLowerCase();

            switch (key) {
                case 'arrowup':
                case 'w':
                    changeDirection(0, -1);
                    break;
                case 'arrowdown':
                case 's':
                    changeDirection(0, 1);
                    break;
                case 'arrowleft':
                case 'a':
                    changeDirection(-1, 0);
                    break;
                case 'arrowright':
                case 'd':
                    changeDirection(1, 0);
                    break;
                case ' ':
                    e.preventDefault();
                    pauseGame();
                    break;
            }
        });

        // 触摸控制
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (!gameRunning || gamePaused) return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;

            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                // 水平滑动
                if (deltaX > 30) {
                    changeDirection(1, 0); // 右
                } else if (deltaX < -30) {
                    changeDirection(-1, 0); // 左
                }
            } else {
                // 垂直滑动
                if (deltaY > 30) {
                    changeDirection(0, 1); // 下
                } else if (deltaY < -30) {
                    changeDirection(0, -1); // 上
                }
            }
        });

        // 防止页面滚动
        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        // 窗口大小改变时调整画布
        window.addEventListener('resize', () => {
            drawGame();
        });
    </script>
</body>
</html>
